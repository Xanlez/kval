{% extends 'base.html' %}

{% block title %}Удаление товара{% endblock %}

{% block content %}
<div class="card border-danger">
    <div class="card-header bg-danger text-white">
        <h1 class="h5 mb-0">Подтверждение удаления</h1>
    </div>
    <div class="card-body">
        <p>Вы уверены, что хотите удалить товар <strong>«{{ product.name }}»</strong>?</p>
        <p class="text-muted mb-0">Артикул: {{ product.sku }} | Цена: {{ product.price }} ₽</p>
    </div>
    <div class="card-footer d-flex gap-2">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
        </form>
        <a href="{% url 'product_list' %}" class="btn btn-secondary">Отмена</a>
    </div>
</div>
{% endblock %}
